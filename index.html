<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="競馬予想">
  <title>競馬予想</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #252836;
      --accent: #10b981;
      --text: #f1f5f9;
      --text-muted: #94a3b8;
      --border: #2d3148;
      --red: #ef4444;
      --blue: #3b82f6;
      --yellow: #f59e0b;
      --purple: #8b5cf6;
      --gray: #6b7280;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── Header ── */
    .header {
      height: 56px;
      background: var(--surface);
      display: flex;
      align-items: center;
      padding: 0 16px;
      border-bottom: 1px solid var(--border);
      gap: 10px;
      flex-shrink: 0;
    }
    .header-title { font-size: 18px; font-weight: 700; flex: 1; }
    .btn-back {
      background: none; border: none;
      color: var(--accent); font-size: 15px; cursor: pointer; padding: 8px 0;
    }
    .btn-header-add {
      background: var(--accent); border: none;
      color: white; font-size: 14px; font-weight: 600;
      padding: 7px 14px; border-radius: 20px; cursor: pointer;
    }

    /* ── Main ── */
    .main { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }

    /* ── Tabs ── */
    .tabs {
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      flex-shrink: 0;
      padding-bottom: env(safe-area-inset-bottom);
    }
    .tab {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 2px; padding: 8px 0;
      background: none; border: none;
      color: var(--text-muted); font-size: 10px; cursor: pointer;
    }
    .tab.active { color: var(--accent); }
    .tab-icon { font-size: 22px; }

    /* ── Cards ── */
    .card {
      background: var(--surface);
      border-radius: 14px;
      margin: 12px 16px;
      overflow: hidden;
    }

    /* ── Section label ── */
    .section-label {
      font-size: 11px; font-weight: 600;
      color: var(--text-muted); letter-spacing: 0.8px;
      padding: 16px 16px 6px; text-transform: uppercase;
    }

    /* ── Race list item ── */
    .race-item {
      display: flex; align-items: center;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      cursor: pointer; gap: 12px;
    }
    .race-item:last-child { border-bottom: none; }
    .race-item:active { background: var(--surface2); }
    .grade-badge {
      font-size: 11px; font-weight: 700;
      padding: 3px 8px; border-radius: 5px;
      white-space: nowrap; color: white;
    }
    .grade-badge.g1 { background: var(--red); }
    .grade-badge.g2 { background: var(--yellow); color: #000; }
    .grade-badge.g3 { background: var(--blue); }
    .grade-badge.other { background: var(--gray); }
    .race-name { font-weight: 600; font-size: 16px; }
    .race-meta { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
    .status-badge {
      font-size: 11px; font-weight: 600;
      padding: 3px 10px; border-radius: 20px; white-space: nowrap;
    }
    .status-badge.draft { background: var(--surface2); color: var(--text-muted); }
    .status-badge.locked { background: rgba(59,130,246,0.2); color: var(--blue); }
    .status-badge.completed { background: rgba(16,185,129,0.15); color: var(--accent); }

    /* ── Horse item ── */
    .horse-item {
      display: flex; align-items: center;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      cursor: pointer; gap: 12px;
    }
    .horse-item:last-child { border-bottom: none; }
    .horse-item:active { background: var(--surface2); }
    .horse-num {
      width: 30px; height: 30px;
      border-radius: 50%; background: var(--surface2);
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700; flex-shrink: 0;
    }
    .horse-name { font-weight: 600; font-size: 15px; }
    .horse-note { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
    .mark { font-size: 20px; font-weight: 700; width: 28px; text-align: center; }
    .mark.◎ { color: var(--red); }
    .mark.○ { color: var(--blue); }
    .mark.▲ { color: var(--yellow); }
    .mark.△ { color: var(--purple); }
    .mark.× { color: var(--gray); }

    /* ── Form ── */
    .form-group { margin-bottom: 16px; }
    .form-label {
      font-size: 12px; color: var(--text-muted);
      margin-bottom: 6px; display: block; font-weight: 500;
    }
    .form-input, .form-select, .form-textarea {
      width: 100%; background: var(--surface2);
      border: 1px solid var(--border); border-radius: 10px;
      padding: 12px 14px; color: var(--text);
      font-size: 16px; outline: none; font-family: inherit;
      -webkit-appearance: none;
    }
    .form-textarea { resize: none; height: 80px; }
    .form-input:focus, .form-select:focus, .form-textarea:focus {
      border-color: var(--accent);
    }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    /* ── Mark selector ── */
    .mark-selector { display: flex; gap: 6px; }
    .mark-btn {
      flex: 1; padding: 11px 2px;
      border-radius: 10px; border: 2px solid var(--border);
      background: none; color: var(--text-muted);
      font-size: 18px; cursor: pointer;
    }
    .mark-btn.sel-◎ { border-color: var(--red); color: var(--red); background: rgba(239,68,68,.12); }
    .mark-btn.sel-○ { border-color: var(--blue); color: var(--blue); background: rgba(59,130,246,.12); }
    .mark-btn.sel-▲ { border-color: var(--yellow); color: var(--yellow); background: rgba(245,158,11,.12); }
    .mark-btn.sel-△ { border-color: var(--purple); color: var(--purple); background: rgba(139,92,246,.12); }
    .mark-btn.sel-× { border-color: var(--gray); color: var(--gray); background: rgba(107,114,128,.12); }
    .mark-btn.sel- { border-color: var(--text-muted); color: var(--text-muted); background: var(--surface2); }

    /* ── Buttons ── */
    .btn-primary {
      background: var(--accent); border: none;
      color: white; padding: 14px; border-radius: 12px;
      font-size: 15px; font-weight: 600; cursor: pointer; width: 100%;
    }
    .btn-secondary {
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); padding: 14px; border-radius: 12px;
      font-size: 15px; font-weight: 600; cursor: pointer; width: 100%;
    }
    .btn-danger {
      background: rgba(239,68,68,.1); border: 1px solid var(--red);
      color: var(--red); padding: 12px; border-radius: 12px;
      font-size: 14px; cursor: pointer; width: 100%;
    }
    .btn-row { display: flex; gap: 10px; padding: 0 16px 12px; }
    .btn-row .btn-primary, .btn-row .btn-secondary { flex: 1; }

    /* ── Result box ── */
    .result-box {
      background: var(--surface2); border-radius: 12px;
      padding: 14px; display: flex; gap: 8px;
    }
    .result-place { flex: 1; text-align: center; }
    .result-rank { font-size: 11px; color: var(--text-muted); }
    .result-horse { font-size: 14px; font-weight: 600; margin-top: 4px; }

    /* ── Stats ── */
    .stats-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 12px; padding: 16px;
    }
    .stat-card {
      background: var(--surface); border-radius: 14px;
      padding: 16px; text-align: center;
    }
    .stat-value { font-size: 32px; font-weight: 700; color: var(--accent); }
    .stat-label { font-size: 11px; color: var(--text-muted); margin-top: 4px; }

    /* ── Mark inline pill ── */
    .mark-pill {
      display: inline-flex; align-items: center; gap: 4px;
      background: var(--surface); padding: 5px 12px;
      border-radius: 20px; font-size: 14px; margin: 3px;
    }

    /* ── Empty state ── */
    .empty { text-align: center; padding: 60px 24px; color: var(--text-muted); }
    .empty-icon { font-size: 48px; margin-bottom: 12px; }

    /* ── Modal ── */
    .modal {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.7);
      display: flex; align-items: flex-end;
      z-index: 100;
    }
    .modal-sheet {
      background: var(--surface);
      border-radius: 20px 20px 0 0;
      width: 100%; max-height: 92dvh;
      overflow-y: auto;
      padding: 20px 16px calc(24px + env(safe-area-inset-bottom));
    }
    .modal-handle {
      width: 36px; height: 4px;
      background: var(--border); border-radius: 2px;
      margin: 0 auto 20px;
    }
    .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; }

    .hidden { display: none !important; }
  </style>
</head>
<body>

<!-- Header -->
<div class="header" id="header">
  <button class="btn-back hidden" id="btn-back" onclick="goBack()">← 戻る</button>
  <div class="header-title" id="header-title">競馬予想</div>
  <button class="btn-header-add hidden" id="btn-add-race" onclick="openAddRaceModal()">＋ 追加</button>
</div>

<!-- Main -->
<div class="main" id="main">
  <div id="view-list"></div>
  <div id="view-detail" class="hidden"></div>
  <div id="view-stats" class="hidden"></div>
</div>

<!-- Tabs -->
<div class="tabs" id="tabs">
  <button class="tab active" id="tab-list" onclick="switchTab('list')">
    <span class="tab-icon">🏇</span><span>レース</span>
  </button>
  <button class="tab" id="tab-stats" onclick="switchTab('stats')">
    <span class="tab-icon">📊</span><span>統計</span>
  </button>
</div>

<!-- Modal -->
<div class="modal hidden" id="modal" onclick="onModalBg(event)">
  <div class="modal-sheet" id="modal-sheet">
    <div class="modal-handle"></div>
    <div id="modal-body"></div>
  </div>
</div>

<script>
// ══════════════════════════════════════════
//  DB
// ══════════════════════════════════════════
let db = (() => { try { return JSON.parse(localStorage.getItem('keiba') || '{"races":[]}'); } catch { return { races: [] }; } })();
const saveDB = () => localStorage.setItem('keiba', JSON.stringify(db));
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 5);

// ══════════════════════════════════════════
//  State
// ══════════════════════════════════════════
let view = 'list';       // 'list' | 'detail' | 'stats'
let activeTab = 'list';  // 'list' | 'stats'
let raceId = null;
let formCtx = {};        // { type, id }
let selMark = '';

// ══════════════════════════════════════════
//  Tab / Navigation
// ══════════════════════════════════════════
function switchTab(tab) {
  activeTab = tab;
  raceId = null;
  view = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  setHeader(tab === 'list' ? '競馬予想' : '統計', false, tab === 'list');
  document.getElementById('tabs').classList.remove('hidden');
  show(tab === 'list' ? 'list' : 'stats');
  tab === 'list' ? renderList() : renderStats();
}

function openDetail(id) {
  raceId = id;
  view = 'detail';
  const r = db.races.find(x => x.id === id);
  setHeader(r?.name || '', true, false);
  document.getElementById('tabs').classList.add('hidden');
  show('detail');
  renderDetail();
}

function goBack() {
  switchTab('list');
}

function show(v) {
  ['list','detail','stats'].forEach(n => {
    document.getElementById('view-' + n).classList.toggle('hidden', n !== v);
  });
}

function setHeader(title, showBack, showAdd) {
  document.getElementById('header-title').textContent = title;
  document.getElementById('btn-back').classList.toggle('hidden', !showBack);
  document.getElementById('btn-add-race').classList.toggle('hidden', !showAdd);
}

// ══════════════════════════════════════════
//  Race List
// ══════════════════════════════════════════
function renderList() {
  const el = document.getElementById('view-list');
  const races = [...db.races].sort((a, b) => b.date.localeCompare(a.date));
  if (!races.length) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">🏇</div><div>レースを追加しましょう</div></div>`;
    return;
  }
  const gc = g => ({ G1:'g1', G2:'g2', G3:'g3' })[g] || 'other';
  const sl = s => ({ draft:'予想中', locked:'予想確定', completed:'完了' })[s];
  el.innerHTML = `<div class="card" style="margin-top:12px">${races.map(r => `
    <div class="race-item" onclick="openDetail('${r.id}')">
      <span class="grade-badge ${gc(r.grade)}">${r.grade}</span>
      <div style="flex:1">
        <div class="race-name">${r.name}</div>
        <div class="race-meta">${r.date} · ${r.venue} · ${r.course}</div>
      </div>
      <span class="status-badge ${r.status}">${sl(r.status)}</span>
    </div>`).join('')}</div>`;
}

// ══════════════════════════════════════════
//  Race Detail
// ══════════════════════════════════════════
function renderDetail() {
  const r = db.races.find(x => x.id === raceId);
  if (!r) return;
  const el = document.getElementById('view-detail');
  const horses = [...r.horses].sort((a, b) => (a.number || 99) - (b.number || 99));
  const mOrd = ['◎','○','▲','△','×',''];
  const marked = [...horses].sort((a, b) => mOrd.indexOf(a.mark) - mOrd.indexOf(b.mark))
                            .filter(h => h.mark && h.mark !== '×');
  const gc = g => ({ G1:'g1', G2:'g2', G3:'g3' })[g] || 'other';

  const resultHtml = r.status === 'completed' && r.result ? `
    <div class="section-label">レース結果</div>
    <div style="padding:0 16px 4px">
      <div class="result-box">
        ${['1','2','3'].map(p => `
          <div class="result-place">
            <div class="result-rank">${p}着</div>
            <div class="result-horse">${r.result[p] || '—'}</div>
          </div>`).join('')}
      </div>
    </div>` : '';

  const markedHtml = marked.length ? `
    <div class="section-label">印</div>
    <div style="padding:0 16px 4px">
      ${marked.map(h => `<span class="mark-pill"><span class="mark ${h.mark}">${h.mark}</span>${h.name}</span>`).join('')}
    </div>` : '';

  const horseListHtml = `
    <div class="section-label">出走馬（${horses.length}頭）</div>
    <div class="card">
      ${horses.length ? horses.map(h => `
        <div class="horse-item" onclick="openEditHorseModal('${h.id}')">
          <div class="horse-num">${h.number || '?'}</div>
          <div style="flex:1">
            <div class="horse-name">${h.name}</div>
            ${h.notes ? `<div class="horse-note">${h.notes}</div>` : ''}
          </div>
          <span class="mark ${h.mark}">${h.mark || ''}</span>
        </div>`).join('') :
        `<div style="padding:24px;text-align:center;color:var(--text-muted)">馬を追加してください</div>`}
    </div>`;

  const notesHtml = r.notes ? `
    <div class="section-label">レースメモ</div>
    <div style="padding:0 16px 4px">
      <div style="background:var(--surface);border-radius:10px;padding:12px;font-size:14px;color:var(--text-muted);white-space:pre-wrap">${r.notes}</div>
    </div>` : '';

  const actionHtml = r.status === 'draft' ? `
    <div class="btn-row" style="margin-top:8px">
      <button class="btn-secondary" onclick="openAddHorseModal()">＋ 馬を追加</button>
      <button class="btn-primary" onclick="lockRace()">予想を確定</button>
    </div>
    <div style="padding:0 16px 8px;display:flex;flex-direction:column;gap:8px">
      <button class="btn-secondary" onclick="openPDFImportModal()">📄 PDFから読み込む</button>
      <button class="btn-secondary" onclick="openEditRaceModal()">レース情報を編集</button>
    </div>` :
    r.status === 'locked' ? `
    <div class="btn-row" style="margin-top:8px">
      <button class="btn-secondary" onclick="unlockRace()">予想を修正</button>
      <button class="btn-primary" onclick="openResultModal()">結果を入力</button>
    </div>` : '';

  const deleteHtml = r.status !== 'completed' ? `
    <div style="padding:4px 16px 24px">
      <button class="btn-danger" onclick="deleteRace()">このレースを削除</button>
    </div>` : '';

  el.innerHTML = `
    <div style="padding:12px 16px">
      <div style="background:var(--surface);border-radius:12px;padding:12px 14px">
        <div style="font-size:12px;color:var(--text-muted)">${r.date} · ${r.venue} · ${r.course}</div>
        <div style="margin-top:4px"><span class="grade-badge ${gc(r.grade)}">${r.grade}</span></div>
      </div>
    </div>
    ${resultHtml}
    ${markedHtml}
    ${horseListHtml}
    ${notesHtml}
    ${actionHtml}
    ${deleteHtml}`;
}

function lockRace() {
  const r = db.races.find(x => x.id === raceId);
  if (r) { r.status = 'locked'; saveDB(); renderDetail(); }
}
function unlockRace() {
  const r = db.races.find(x => x.id === raceId);
  if (r) { r.status = 'draft'; saveDB(); renderDetail(); }
}
function deleteRace() {
  if (!confirm('このレースを削除しますか？')) return;
  db.races = db.races.filter(x => x.id !== raceId);
  saveDB(); goBack();
}

// ══════════════════════════════════════════
//  Stats
// ══════════════════════════════════════════
function renderStats() {
  const done = db.races.filter(r => r.status === 'completed');
  const total = done.length;
  let honmeiHit = 0, anyHit = 0;
  done.forEach(r => {
    if (!r.result) return;
    const w = r.result['1'];
    const top3 = Object.values(r.result);
    const hm = r.horses.find(h => h.mark === '◎');
    if (hm?.name === w) honmeiHit++;
    const marks = r.horses.filter(h => ['◎','○','▲','△'].includes(h.mark)).map(h => h.name);
    if (top3.some(n => marks.includes(n))) anyHit++;
  });
  const pct = (n, d) => d ? Math.round(n / d * 100) : 0;

  const el = document.getElementById('view-stats');
  el.innerHTML = `
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-value">${total}</div><div class="stat-label">予想レース数</div></div>
      <div class="stat-card"><div class="stat-value">${honmeiHit}</div><div class="stat-label">◎的中数</div></div>
      <div class="stat-card"><div class="stat-value">${pct(honmeiHit,total)}%</div><div class="stat-label">◎的中率</div></div>
      <div class="stat-card"><div class="stat-value">${pct(anyHit,total)}%</div><div class="stat-label">印内的中率</div></div>
    </div>
    ${!done.length ? `<div class="empty"><div class="empty-icon">📊</div><div>結果を入力すると統計が表示されます</div></div>` : `
      <div class="section-label">完了レース</div>
      <div class="card">
        ${done.sort((a,b) => b.date.localeCompare(a.date)).map(r => {
          const hm = r.horses.find(h => h.mark === '◎');
          const w = r.result?.['1'];
          const hit = hm?.name === w;
          return `<div class="race-item" onclick="openDetail('${r.id}')">
            <span class="grade-badge ${({G1:'g1',G2:'g2',G3:'g3'})[r.grade]||'other'}">${r.grade}</span>
            <div style="flex:1">
              <div class="race-name">${r.name}</div>
              <div class="race-meta">◎${hm?.name||'未設定'} → 1着 ${w||'?'}</div>
            </div>
            <span style="font-size:22px">${hit?'✅':'❌'}</span>
          </div>`;
        }).join('')}
      </div>`}`;
}

// ══════════════════════════════════════════
//  Modals
// ══════════════════════════════════════════
function openModal(html) {
  document.getElementById('modal-body').innerHTML = html;
  document.getElementById('modal').classList.remove('hidden');
}
function closeModal() {
  document.getElementById('modal').classList.add('hidden');
}
function onModalBg(e) {
  if (e.target === document.getElementById('modal')) closeModal();
}

// ── Add Race ──
function openAddRaceModal() {
  formCtx = { type: 'add-race' };
  const today = new Date().toISOString().slice(0, 10);
  openModal(`
    <div class="modal-title">レースを追加</div>
    <div class="form-group">
      <label class="form-label">レース名</label>
      <input class="form-input" id="f-name" placeholder="宝塚記念" type="text">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">グレード</label>
        <select class="form-select" id="f-grade">
          <option>G1</option><option>G2</option><option>G3</option><option>重賞</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">開催日</label>
        <input class="form-input" id="f-date" type="date" value="${today}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">競馬場</label>
        <select class="form-select" id="f-venue">
          ${['東京','中山','阪神','京都','中京','新潟','福島','小倉','札幌','函館'].map(v=>`<option>${v}</option>`).join('')}
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">コース</label>
        <input class="form-input" id="f-course" placeholder="芝2400m">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">メモ（任意）</label>
      <textarea class="form-textarea" id="f-notes" placeholder="コース傾向・注目点など"></textarea>
    </div>
    <button class="btn-primary" onclick="saveRace()">追加する</button>`);
}

// ── Edit Race ──
function openEditRaceModal() {
  const r = db.races.find(x => x.id === raceId);
  if (!r) return;
  formCtx = { type: 'edit-race' };
  const venues = ['東京','中山','阪神','京都','中京','新潟','福島','小倉','札幌','函館'];
  openModal(`
    <div class="modal-title">レースを編集</div>
    <div class="form-group">
      <label class="form-label">レース名</label>
      <input class="form-input" id="f-name" value="${r.name}" type="text">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">グレード</label>
        <select class="form-select" id="f-grade">
          ${['G1','G2','G3','重賞'].map(g=>`<option ${g===r.grade?'selected':''}>${g}</option>`).join('')}
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">開催日</label>
        <input class="form-input" id="f-date" type="date" value="${r.date}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">競馬場</label>
        <select class="form-select" id="f-venue">
          ${venues.map(v=>`<option ${v===r.venue?'selected':''}>${v}</option>`).join('')}
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">コース</label>
        <input class="form-input" id="f-course" value="${r.course}">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">メモ</label>
      <textarea class="form-textarea" id="f-notes">${r.notes||''}</textarea>
    </div>
    <button class="btn-primary" onclick="saveRace()">保存する</button>`);
}

function saveRace() {
  const name = document.getElementById('f-name').value.trim();
  const grade = document.getElementById('f-grade').value;
  const date = document.getElementById('f-date').value;
  const venue = document.getElementById('f-venue').value;
  const course = document.getElementById('f-course').value.trim();
  const notes = document.getElementById('f-notes').value.trim();
  if (!name) { alert('レース名を入力してください'); return; }
  if (formCtx.type === 'add-race') {
    db.races.push({ id: uid(), name, grade, date, venue, course, notes, status: 'draft', horses: [], result: null });
  } else {
    const r = db.races.find(x => x.id === raceId);
    if (r) Object.assign(r, { name, grade, date, venue, course, notes });
  }
  saveDB(); closeModal();
  view === 'detail' ? renderDetail() : renderList();
}

// ── Add Horse ──
function openAddHorseModal() {
  formCtx = { type: 'add-horse' };
  selMark = '';
  openModal(horseForm(null));
}
function openEditHorseModal(horseId) {
  const r = db.races.find(x => x.id === raceId);
  const h = r?.horses.find(x => x.id === horseId);
  if (!h) return;
  formCtx = { type: 'edit-horse', horseId };
  selMark = h.mark || '';
  openModal(horseForm(h));
}

function horseForm(h) {
  const marks = ['◎','○','▲','△','×'];
  return `
    <div class="modal-title">${h ? '馬を編集' : '馬を追加'}</div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">馬番</label>
        <input class="form-input" id="f-num" type="number" min="1" max="18" value="${h?.number||''}">
      </div>
      <div class="form-group" style="grid-column:span 1">
        <label class="form-label">馬名</label>
        <input class="form-input" id="f-hname" value="${h?.name||''}" placeholder="馬名">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">印</label>
      <div class="mark-selector" id="mark-sel">
        ${marks.map(m => `<button class="mark-btn${selMark===m?' sel-'+m:''}" onclick="pickMark('${m}',this)">${m}</button>`).join('')}
        <button class="mark-btn${selMark===''?' sel-':''}" onclick="pickMark('',this)" style="font-size:12px">なし</button>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">メモ</label>
      <textarea class="form-textarea" id="f-hnotes" placeholder="騎手・前走・特徴など">${h?.notes||''}</textarea>
    </div>
    <button class="btn-primary" style="margin-bottom:8px" onclick="saveHorse()">
      ${h ? '保存する' : '追加する'}
    </button>
    ${h ? `<button class="btn-danger" onclick="deleteHorse('${h.id}')">この馬を削除</button>` : ''}`;
}

function pickMark(m, btn) {
  selMark = m;
  document.querySelectorAll('.mark-btn').forEach(b => b.className = 'mark-btn');
  btn.className = `mark-btn sel-${m}`;
}

function saveHorse() {
  const number = parseInt(document.getElementById('f-num').value) || null;
  const name = document.getElementById('f-hname').value.trim();
  const notes = document.getElementById('f-hnotes').value.trim();
  if (!name) { alert('馬名を入力してください'); return; }
  const r = db.races.find(x => x.id === raceId);
  if (!r) return;
  if (formCtx.type === 'add-horse') {
    r.horses.push({ id: uid(), number, name, mark: selMark, notes });
  } else {
    const h = r.horses.find(x => x.id === formCtx.horseId);
    if (h) Object.assign(h, { number, name, mark: selMark, notes });
  }
  saveDB(); closeModal(); renderDetail();
}

function deleteHorse(horseId) {
  if (!confirm('この馬を削除しますか？')) return;
  const r = db.races.find(x => x.id === raceId);
  if (r) r.horses = r.horses.filter(x => x.id !== horseId);
  saveDB(); closeModal(); renderDetail();
}

// ── Result ──
function openResultModal() {
  const r = db.races.find(x => x.id === raceId);
  if (!r) return;
  const res = r.result || {};
  const names = r.horses.map(h => h.name);
  const dl = (id, sel) => `<datalist id="${id}">${names.map(n=>`<option value="${n}"${n===sel?' selected':''}>`).join('')}</datalist>`;
  openModal(`
    <div class="modal-title">結果を入力</div>
    <div class="form-group">
      <label class="form-label">1着</label>
      <input class="form-input" id="r-1" list="dl1" value="${res['1']||''}" placeholder="馬名">
      ${dl('dl1', res['1'])}
    </div>
    <div class="form-group">
      <label class="form-label">2着</label>
      <input class="form-input" id="r-2" list="dl2" value="${res['2']||''}" placeholder="馬名">
      ${dl('dl2', res['2'])}
    </div>
    <div class="form-group">
      <label class="form-label">3着</label>
      <input class="form-input" id="r-3" list="dl3" value="${res['3']||''}" placeholder="馬名">
      ${dl('dl3', res['3'])}
    </div>
    <button class="btn-primary" onclick="saveResult()">結果を確定</button>`);
}

function saveResult() {
  const r1 = document.getElementById('r-1').value.trim();
  const r2 = document.getElementById('r-2').value.trim();
  const r3 = document.getElementById('r-3').value.trim();
  if (!r1) { alert('1着を入力してください'); return; }
  const r = db.races.find(x => x.id === raceId);
  if (r) { r.result = { '1': r1, '2': r2, '3': r3 }; r.status = 'completed'; }
  saveDB(); closeModal(); renderDetail();
}

// ══════════════════════════════════════════
//  PDF Import
// ══════════════════════════════════════════
const PDF_WORKER = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
let pdfHorses = [];

function openPDFImportModal() {
  openModal(`
    <div class="modal-title">PDFから読み込む</div>
    <div style="background:rgba(245,158,11,.1);border:1px solid var(--yellow);border-radius:10px;padding:12px;margin-bottom:16px;font-size:12px;color:var(--yellow);line-height:1.7">
      ⚠️ netkeibaの競馬新聞PDFはフォントの仕様により<br>
      馬名が文字化けする場合があります。<br>
      <span style="color:var(--text-muted)">インポート後に馬名をタップして修正してください。</span>
    </div>
    <label class="btn-primary" style="display:block;text-align:center;cursor:pointer">
      PDFファイルを選択
      <input type="file" accept=".pdf,application/pdf" style="display:none" onchange="handlePDFSelect(this)">
    </label>
    <div id="pdf-status" style="margin-top:16px;text-align:center;color:var(--text-muted);font-size:14px"></div>
    <div id="pdf-result"></div>`);
}

async function handlePDFSelect(input) {
  const file = input.files[0];
  if (!file) return;
  const status = document.getElementById('pdf-status');
  status.textContent = '読み込み中...';

  try {
    if (!window.pdfjsLib) throw new Error('PDF.jsの読み込みに失敗しました');
    pdfjsLib.GlobalWorkerOptions.workerSrc = PDF_WORKER;

    const buf = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: buf }).promise;

    const items = [];
    for (let p = 1; p <= pdf.numPages; p++) {
      const page = await pdf.getPage(p);
      const content = await page.getTextContent();
      for (const it of content.items) {
        const t = it.str.trim();
        if (t) items.push({ text: t, x: Math.round(it.transform[4]), y: Math.round(it.transform[5]) });
      }
    }

    const horses = parsePDFHorses(items);

    if (!horses.length) {
      status.innerHTML = `<span style="color:var(--red)">馬データを自動認識できませんでした。</span>`;
      // 診断用: 抽出されたテキストの先頭30件を表示
      document.getElementById('pdf-result').innerHTML = `
        <div style="margin-top:12px">
          <div style="font-size:12px;color:var(--text-muted);margin-bottom:6px">
            📋 抽出テキスト（${items.length}件） — スクリーンショットを共有してください
          </div>
          <div style="background:var(--surface2);border-radius:8px;padding:10px;font-size:10px;
                      color:var(--text-muted);word-break:break-all;max-height:200px;overflow-y:auto;
                      font-family:monospace;line-height:1.6">
            ${items.slice(0, 40).map(it =>
              `<div>"${it.text.replace(/</g,'&lt;')}" (x:${it.x} y:${it.y})</div>`
            ).join('')}
          </div>
        </div>`;
      return;
    }

    status.textContent = `${horses.length}頭を認識しました`;
    pdfHorses = horses;
    renderPDFConfirm(horses);

  } catch (e) {
    status.innerHTML = `<span style="color:var(--red)">エラー: ${e.message}</span>`;
  }
}

function parsePDFHorses(items) {
  // Y降順（PDFのY座標は下から）→ X昇順でソート
  items.sort((a, b) => {
    const dy = b.y - a.y;
    return Math.abs(dy) > 5 ? dy : a.x - b.x;
  });

  // 近いY座標（±5px）をグループ化して「行」に
  const rows = [];
  let rowY = null, row = [];
  for (const it of items) {
    if (rowY === null || Math.abs(it.y - rowY) <= 5) {
      row.push(it.text);
      if (rowY === null) rowY = it.y;
    } else {
      if (row.length) rows.push([...row]);
      row = [it.text];
      rowY = it.y;
    }
  }
  if (row.length) rows.push([...row]);

  const horses = [];
  const seen = new Set();

  for (let i = 0; i < rows.length - 2; i++) {
    const r = rows[i];

    // 枠番・馬番の行を検出:
    // 数字のみで構成され、最初の2数字が [1-8] と [1-18] の組み合わせ
    let waku, banum;

    if (r.length === 1 && /^\d{1,2}\s+\d{1,2}$/.test(r[0])) {
      // "1 2" のような単一テキストの場合
      const parts = r[0].trim().split(/\s+/).map(Number);
      [waku, banum] = parts;
    } else {
      // 数字以外の要素が含まれていたらスキップ
      const nonNum = r.filter(t => !/^\d{1,2}$/.test(t));
      if (nonNum.length > 0) continue;
      const nums = r.map(Number);
      if (nums.length < 2) continue;
      [waku, banum] = nums;
    }

    if (!waku || !banum) continue;
    if (waku < 1 || waku > 8) continue;
    if (banum < 1 || banum > 18) continue;
    if (waku > banum) continue;
    if (seen.has(banum)) continue;

    // netkeibaの構造:
    //   row i   : 枠番 馬番
    //   row i+1 : 父名 + 性齢毛色（スキップ）
    //   row i+2 : 馬名 ← ここを取得
    const nameRow = rows[i + 2];
    if (!nameRow?.length) continue;

    const raw = nameRow.find(t => t.length >= 2 && !/^\d+$/.test(t)) || '';
    if (!raw) continue;

    // カタカナ比率が低い場合は文字化けフラグを立てる
    const katakana = (raw.match(/[ァ-ヶーヴ]/g) || []).length;
    const garbled = katakana / raw.length < 0.5;

    seen.add(banum);
    horses.push({ number: banum, name: raw.trim(), garbled });
  }

  return horses.sort((a, b) => a.number - b.number);
}

function renderPDFConfirm(horses) {
  const garbledCount = horses.filter(h => h.garbled).length;
  const note = garbledCount > 0
    ? `<div style="font-size:12px;color:var(--yellow);margin-bottom:8px">⚠️ ${garbledCount}頭の馬名が文字化けしています（赤字）。タップして修正してください。</div>`
    : `<div style="font-size:12px;color:var(--accent);margin-bottom:8px">✓ 馬名を読み取りました。確認してインポートしてください。</div>`;

  document.getElementById('pdf-result').innerHTML = `
    <div style="margin-top:16px">
      ${note}
      <div style="background:var(--surface2);border-radius:10px;overflow:hidden;margin-bottom:12px">
        ${horses.map((h, i) => `
          <div style="display:flex;align-items:center;padding:10px 12px;border-bottom:1px solid var(--border);gap:8px">
            <input type="checkbox" id="pc-${i}" checked style="width:18px;height:18px;accent-color:var(--accent);flex-shrink:0">
            <span style="color:var(--text-muted);width:22px;font-size:13px;flex-shrink:0">${h.number}</span>
            <input type="text" id="pn-${i}" value="${h.name}"
              style="flex:1;background:transparent;border:none;border-bottom:1px solid ${h.garbled ? 'var(--red)' : 'var(--border)'};
                     color:${h.garbled ? 'var(--red)' : 'var(--text)'};font-size:15px;font-weight:600;outline:none;padding-bottom:2px">
          </div>`).join('')}
      </div>
      <button class="btn-primary" onclick="importPDFHorses()">インポートする</button>
    </div>`;
}

function importPDFHorses() {
  const r = db.races.find(x => x.id === raceId);
  if (!r) return;
  let count = 0;
  pdfHorses.forEach((h, i) => {
    const checked = document.getElementById('pc-' + i)?.checked;
    const name = document.getElementById('pn-' + i)?.value.trim();
    if (!checked || !name) return;
    if (!r.horses.find(x => x.number === h.number)) {
      r.horses.push({ id: uid(), number: h.number, name, mark: '', notes: '' });
      count++;
    }
  });
  saveDB(); closeModal(); renderDetail();
}
